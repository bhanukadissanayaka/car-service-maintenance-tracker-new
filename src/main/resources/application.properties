spring.application.name=demo

# Database Configuration (MySQL - Default)
# spring.datasource.url=jdbc:mysql://localhost:3306/car_tracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Backup Database Configuration (H2 In-Memory - Uncomment these and comment MySQL to run with ZERO setup)
spring.datasource.url=jdbc:h2:file:./data/car_tracker_db;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE,YEAR
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# H2 Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

