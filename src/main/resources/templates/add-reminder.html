<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Set Reminder')}">
    <title>Set Reminder</title>
</head>
<body>

    <div th:replace="~{layout :: app-shell('dashboard', ~{::content})}">
        <th:block th:fragment="content">
            <!-- Breadcrumbs -->
            <div style="margin-bottom: 20px;">
                <a th:href="@{'/cars/' + ${car.id}}" style="font-size: 14px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 6px;">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back to Vehicle Profile</span>
                </a>
            </div>

            <!-- Header -->
            <div class="page-header">
                <div>
                    <h1 class="page-title">Set Alert Reminder</h1>
                    <p class="page-subtitle" th:text="'Configure dynamic reminders for your ' + ${car.make} + ' ' + ${car.model}"></p>
                </div>
            </div>
            
            <!-- Form Panel -->
            <div class="glass-panel form-card">
                <form th:action="@{'/cars/' + ${car.id} + '/reminders/add'}" th:object="${reminder}" method="post" onsubmit="return validateForm()">
                    <div class="form-group">
                        <label for="description" class="form-label">Service / Part Description</label>
                        <input type="text" id="description" th:field="*{description}" class="form-control" placeholder="e.g. Replace Cabin Filter, Rotate Spark Plugs" required>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="dueMileage" class="form-label">Trigger Mileage Odometer (mi) <span style="font-size: 11px; color: var(--text-secondary); font-weight: normal;">(Optional)</span></label>
                            <input type="number" id="dueMileage" th:field="*{dueMileage}" th:min="${car.currentMileage}" class="form-control" placeholder="e.g. 50000">
                        </div>
                        
                        <div class="form-group">
                            <label for="dueDate" class="form-label">Trigger Date <span style="font-size: 11px; color: var(--text-secondary); font-weight: normal;">(Optional)</span></label>
                            <input type="date" id="dueDate" th:field="*{dueDate}" class="form-control">
                        </div>
                    </div>
                    
                    <p id="form-error" style="color: var(--danger); font-size: 13px; margin-top: -12px; margin-bottom: 24px; font-weight: 500; display: none;">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                        <span>Please fill in at least one trigger condition (Mileage or Date).</span>
                    </p>
                    
                    <div style="display: flex; gap: 16px; justify-content: flex-end; margin-top: 10px;">
                        <a th:href="@{'/cars/' + ${car.id}}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-circle-check"></i>
                            <span>Configure Alert</span>
                        </button>
                    </div>
                </form>
            </div>
            
            <script>
                function validateForm() {
                    const dueMileage = document.getElementById('dueMileage').value;
                    const dueDate = document.getElementById('dueDate').value;
                    const errorMsg = document.getElementById('form-error');
                    
                    if (!dueMileage && !dueDate) {
                        errorMsg.style.display = 'block';
                        return false;
                    }
                    errorMsg.style.display = 'none';
                    return true;
                }
            </script>
        </th:block>
    </div>
</body>
</html>
